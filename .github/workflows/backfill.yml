name: StockScout Backfill (one-time)

# 初回だけ手動で実行する。
# GitHub Releases に price-store.json.gz を保存する。
# GITHUB_TOKEN は Actions が自動で提供するため、追加の Secrets 登録は不要。
#
# 実行方法: Actions タブ → "StockScout Backfill (one-time)" → "Run workflow"
# 所要時間: 約40〜50分(全銘柄5年分)
on:
  workflow_dispatch: {}

permissions:
  contents: write   # GitHub Releases の作成・アセットアップロードに必要

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 共有ロジックを StockScout.jsx から自動抽出
        run: node scripts/extract-logic.mjs

      - name: バックフィル実行(全銘柄5年分 → GitHub Releases に保存)
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STORE_BACKEND: github
        run: node batch/backfill.mjs

      - name: 完了メッセージ
        run: |
          echo "✅ バックフィル完了"
          echo "GitHub Releases (タグ: price-store-data) に price-store.json.gz が作成されました。"
          echo "次のステップ: Actions → StockScout Daily Batch → Run workflow"
